                            <div key={i} className="bg-slate-200 rounded-xl aspect-square relative group overflow-hidden shadow-sm border border-slate-200">
                                <img src={img} alt="Galeri" className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" />
                                <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3">
                                    <button className="bg-white text-slate-800 w-8 h-8 rounded-full flex items-center justify-center hover:bg-alo-blue hover:text-white transition-colors" title="Lihat">
                                        <span className="material-symbols-outlined text-[16px]">visibility</span>
                                    </button>
                                    <button onClick={() => showToast('Foto dihapus.')} className="bg-white text-red-500 w-8 h-8 rounded-full flex items-center justify-center hover:bg-red-500 hover:text-white transition-colors" title="Hapus">
                                        <span className="material-symbols-outlined text-[16px]">delete</span>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );

            // Komponen Modal Generic
            const renderModal = () => {
                if (!activeModal) return null;

                let title = '';
                let content = null;

                if (activeModal === 'struktur') {
                    title = 'Tambah Struktur Organisasi';
                    content = (
                        <div className="space-y-4">
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap & Gelar</label><input type="text" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" /></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Jabatan / Posisi</label><input type="text" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" /></div>
                        </div>
                    );
                } else if (activeModal === 'jadwal' || activeModal === 'edit_jadwal') {
                    title = activeModal === 'edit_jadwal' ? 'Edit Jadwal Acara' : 'Tambah Jadwal Acara';
                    content = (
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1">Nama Acara</label>
                                <input type="text" className="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 focus:outline-none" defaultValue={activeModal === 'edit_jadwal' ? 'Bantuan Hidup Dasar (BHD)' : ''} />
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">Kategori</label>
                                    <select className="w-full px-4 py-2 border rounded-lg focus:outline-none bg-white">
                                        <option selected={activeModal === 'edit_jadwal'}>Pelatihan</option>
                                        <option>Webinar</option>
                                        <option>Workshop</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-sm font-semibold text-slate-700 mb-1">Tanggal & Waktu</label>
                                    <input type="text" placeholder="Misal: 15-16 Agustus 2026, 08:00 WIB" className="w-full px-4 py-2 border rounded-lg focus:outline-none" defaultValue={activeModal === 'edit_jadwal' ? '15-16 Agustus 2026' : ''} />
                                </div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div><label className="block text-sm font-semibold text-slate-700 mb-1">Harga (Rp)</label><input type="text" className="w-full px-4 py-2 border rounded-lg focus:outline-none" defaultValue={activeModal === 'edit_jadwal' ? '1.500.000' : ''} /></div>
                                <div><label className="block text-sm font-semibold text-slate-700 mb-1">Kuota Peserta</label><input type="number" className="w-full px-4 py-2 border rounded-lg focus:outline-none" defaultValue={activeModal === 'edit_jadwal' ? '20' : ''} /></div>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1">Status Ketersediaan</label>
                                <select className="w-full px-4 py-2 border rounded-lg focus:outline-none bg-white">
                                    <option selected={activeModal === 'edit_jadwal'}>Tersedia</option>
                                    <option>Hampir Penuh</option>
                                    <option>Penuh</option>
                                </select>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1">Deskripsi Lengkap</label>
                                <textarea rows="3" className="w-full px-4 py-2 border rounded-lg focus:outline-none" defaultValue={activeModal === 'edit_jadwal' ? 'Pelatihan komprehensif mengenai teknik resusitasi jantung paru...' : ''}></textarea>
                            </div>
                        </div>
                    );
                } else if (activeModal === 'program' || activeModal === 'edit_program') {
                    title = activeModal === 'edit_program' ? 'Edit Program Utama' : 'Tambah Program Utama';
                    content = (
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1">Nama Program</label>
                                <input type="text" className="w-full px-4 py-2 border rounded-lg focus:outline-none" defaultValue={activeModal === 'edit_program' ? 'Bantuan Hidup Dasar (BHD)' : ''} />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1">Deskripsi Singkat</label>
                                <textarea rows="2" className="w-full px-4 py-2 border rounded-lg focus:outline-none" defaultValue={activeModal === 'edit_program' ? 'Pelatihan esensial penanganan kegawatdaruratan medis dasar.' : ''}></textarea>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-1">Ikon (Material Icons)</label>
                                <input type="text" placeholder="Misal: ecg_heart" className="w-full px-4 py-2 border rounded-lg focus:outline-none" defaultValue={activeModal === 'edit_program' ? 'ecg_heart' : ''} />
                            </div>
                            <div className="bg-slate-50 p-4 border border-slate-200 rounded-lg">
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Upload Modul Pembelajaran (PDF/DOCX)</label>
                                <input type="file" accept=".pdf,.doc,.docx" className="w-full px-3 py-2 border border-slate-300 rounded focus:outline-none bg-white text-sm" />
                                {activeModal === 'edit_program' && (
                                    <p className="text-xs font-semibold text-teal-600 mt-2 flex items-center gap-1">
                                        <span className="material-symbols-outlined text-[14px]">check_circle</span> Modul tersimpan: modul_bhd_2026.pdf
                                    </p>
                                )}
                            </div>
                        </div>
                    );
                } else if (activeModal === 'pengajar' || activeModal === 'edit_pengajar') {
                    title = activeModal === 'edit_pengajar' ? 'Edit Data Pengajar' : 'Tambah Data Pengajar';
                    content = (
                        <div className="space-y-4">
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Nama Lengkap</label><input type="text" className="w-full px-4 py-2 border rounded-lg focus:outline-none" defaultValue={activeModal === 'edit_pengajar' ? 'Dr. Andi Pratama, Sp.EM' : ''} /></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Spesialisasi / Role</label><input type="text" className="w-full px-4 py-2 border rounded-lg focus:outline-none" defaultValue={activeModal === 'edit_pengajar' ? 'Spesialis Ahli Gawat Darurat' : ''} /></div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">URL Foto Profil</label><input type="text" placeholder="https://..." className="w-full px-4 py-2 border rounded-lg focus:outline-none" defaultValue={activeModal === 'edit_pengajar' ? 'https://images.unsplash.com/photo...' : ''} /></div>
                        </div>
                    );
                } else if (activeModal === 'galeri') {
                    title = 'Upload Foto Kegiatan';
                    content = (
                        <div className="space-y-4">
                            <div className="border-2 border-dashed border-slate-300 rounded-xl p-8 text-center bg-slate-50 hover:bg-blue-50 hover:border-blue-300 transition-colors cursor-pointer">
                                <span className="material-symbols-outlined text-4xl text-slate-400 mb-2">cloud_upload</span>
                                <p className="text-sm text-slate-600 font-semibold">Klik untuk memilih file foto</p>
                                <p className="text-xs text-slate-400 mt-1">Format: JPG, PNG (Maks 2MB)</p>
                            </div>
                            <div><label className="block text-sm font-semibold text-slate-700 mb-1">Atau gunakan URL Gambar</label><input type="text" placeholder="https://..." className="w-full px-4 py-2 border rounded-lg focus:outline-none" /></div>
                        </div>
                    );
                } else if (activeModal === 'approve_peserta') {
                    title = 'Verifikasi Pembayaran';
                    content = (
                        <div className="space-y-4">
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-4">
                                <p className="text-sm text-slate-500">Nama Peserta</p>
                                <p className="font-bold text-slate-800 text-lg">dr. Budi Santoso</p>
                                <p className="text-sm text-alo-blue font-semibold mt-1">Bantuan Hidup Dasar (BHD)</p>
                            </div>
                            <div className="bg-orange-50 p-4 rounded-lg border border-orange-200">
                                <p className="text-sm text-orange-800 font-semibold mb-2">Pastikan dana sebesar <strong>Rp 1.500.000</strong> telah masuk ke rekening lembaga sebelum menyetujui.</p>
                            </div>
                        </div>
                    );
                } else if (activeModal === 'upload_sertifikat') {
                    title = 'Upload E-Sertifikat';
                    content = (
                        <div className="space-y-4">
                            <div className="bg-slate-50 p-4 rounded-lg border border-slate-200 mb-4">
                                <p className="text-sm text-slate-500">Nama Peserta</p>
                                <p className="font-bold text-slate-800">Ns. Ani Rahmawati, S.Kep</p>
                                <p className="text-sm text-alo-blue font-semibold mt-1">K3 Rumah Sakit</p>
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-slate-700 mb-2">Pilih File Sertifikat (PDF/JPG)</label>
                                <input type="file" accept=".pdf,.jpg,.jpeg,.png" className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none bg-white text-sm" />
                            </div>
                            <div className="text-xs text-slate-500 flex gap-1 mt-2">
                                <span className="material-symbols-outlined text-[14px]">info</span>
                                File ini nantinya akan otomatis muncul dan bisa diunduh langsung di Dashboard Member milik peserta ini.
                            </div>
                        </div>
                    );
                }

                return (
                    <div className="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-center justify-center p-4 animate-fade-in">
                        <div className="bg-white rounded-2xl w-full max-w-lg shadow-2xl overflow-hidden flex flex-col max-h-[90vh]">
                            <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                <h3 className="font-bold text-lg text-slate-800">{title}</h3>
                                <button onClick={() => setActiveModal(null)} className="text-slate-400 hover:text-red-500 transition-colors"><span className="material-symbols-outlined">close</span></button>
                            </div>
                            <div className="p-6 overflow-y-auto custom-scrollbar">
                                {content}
                            </div>
                            <div className="p-5 border-t border-slate-100 bg-slate-50 flex justify-end gap-3">
                                <button onClick={() => setActiveModal(null)} className="px-5 py-2 text-sm font-bold text-slate-600 hover:bg-slate-200 rounded-lg transition-colors">Batal</button>
                                <button onClick={() => { 
                                    setActiveModal(null); 
                                    if(activeModal === 'approve_peserta') showToast('Pembayaran berhasil diverifikasi!');
                                    else if(activeModal === 'upload_sertifikat') showToast('E-Sertifikat berhasil diupload!');
                                    else showToast('Data berhasil disimpan!'); 
                                }} className={`px-5 py-2 text-sm font-bold text-white rounded-lg transition-colors ${activeModal === 'approve_peserta' ? 'bg-green-500 hover:bg-green-600' : 'bg-alo-blue hover:bg-blue-700'}`}>
                                    {activeModal === 'approve_peserta' ? 'Verifikasi & Lunas' : activeModal === 'upload_sertifikat' ? 'Upload Sertifikat' : 'Simpan Data'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="flex h-screen w-full bg-slate-100 overflow-hidden relative">
                    
                    {/* Toast Notification */}
                    {toastMessage && (
                        <div className="absolute top-6 right-8 z-[100] animate-fade-in">
                            <div className="bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center gap-3 border border-slate-700">
                                <span className="material-symbols-outlined text-green-400">check_circle</span>
                                <span className="text-sm font-medium">{toastMessage}</span>
                            </div>
                        </div>
                    )}

                    {/* Sidebar */}
                    <aside className="w-64 bg-admin-sidebar text-slate-300 flex flex-col flex-shrink-0 shadow-xl z-20">
                        <div className="h-16 flex items-center px-6 border-b border-slate-700/50 bg-admin-dark">
                            <span className="material-symbols-outlined text-alo-blue mr-2">admin_panel_settings</span>
                            <span className="font-bold text-white tracking-wide">CMS ADMIN</span>
                        </div>
                        
                        <div className="flex-1 overflow-y-auto py-6 px-3 space-y-1">
                            <p className="px-3 text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Menu Utama</p>
                            {menus.map(menu => (
                                <button 
                                    key={menu.id} 
                                    onClick={() => setActiveMenu(menu.id)}
                                    className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium ${activeMenu === menu.id ? 'bg-alo-blue text-white shadow-md' : 'hover:bg-slate-800 hover:text-white'}`}
                                >
                                    <span className="material-symbols-outlined text-[20px]">{menu.icon}</span>
                                    {menu.label}
                                </button>
                            ))}
                        </div>
                        
                        <div className="p-4 border-t border-slate-700/50">
                            <button className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors text-sm font-medium text-red-400 hover:bg-red-500/10">
                                <span className="material-symbols-outlined text-[20px]">logout</span>
                                Keluar Sistem
                            </button>
                        </div>
                    </aside>

                    {/* Main Content Area */}
                    <main className="flex-1 flex flex-col h-screen overflow-hidden relative">
                        <header className="h-16 bg-white border-b border-slate-200 flex items-center justify-between px-8 flex-shrink-0 z-10 shadow-sm">
                            <div className="flex items-center gap-2 text-sm font-medium text-slate-500">
                                <span className="material-symbols-outlined text-[18px]">home</span> / <span className="text-alo-blue font-bold">{activeMenu}</span>
                            </div>
                            <div className="flex items-center gap-4">
                                {/* Tombol Lihat Website (Open in New Tab) */}
                                <a href="index.html" target="_blank" className="flex items-center gap-2 bg-blue-50 text-alo-blue border border-blue-200 px-4 py-2 rounded-lg font-bold text-sm hover:bg-blue-100 transition-colors shadow-sm">
                                    <span className="material-symbols-outlined text-[18px]">open_in_new</span> Lihat Website
                                </a>

                                <div className="h-6 w-px bg-slate-300 mx-2"></div>

                                <button className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center text-slate-500 hover:bg-slate-200 relative">
                                    <span className="material-symbols-outlined text-[20px]">notifications</span>
                                    <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border border-white"></span>
                                </button>
                                <div className="flex items-center gap-2 pl-4 border-l border-slate-200">
                                    <div className="text-right hidden md:block">
                                        <p className="text-sm font-bold text-slate-800">Admin Pusat</p>
                                        <p className="text-xs text-slate-500">Super Administrator</p>
                                    </div>
                                    <div className="w-9 h-9 rounded-full bg-alo-blue text-white flex items-center justify-center font-bold shadow-md">
                                        A
                                    </div>
                                </div>
                            </div>
                        </header>

                        <div className="flex-1 overflow-y-auto p-8 bg-slate-50 custom-scrollbar">
                            {activeMenu === 'Dashboard' && renderDashboard()}
                            {activeMenu === 'Profil' && renderProfil()}
                            {activeMenu === 'Program' && renderProgram()}
                            {activeMenu === 'Jadwal' && renderJadwal()}
                            {activeMenu === 'Peserta' && renderPeserta()}
                            {activeMenu === 'Pengajar' && renderPengajar()}
                            {activeMenu === 'Berita' && renderBerita()}
                            {activeMenu === 'Galeri' && renderGaleri()}
                        </div>
                    </main>

                    {/* Render Modals */}
                    {renderModal()}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AdminDashboard />);
    </script>
</body>
</html>
